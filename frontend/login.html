<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System - Login</title>
    <link rel="stylesheet" href="LoginForm.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎓 College Management System</h1>
            <p class="subtitle">Please login to continue</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <!-- Removed "I am a:" label -->
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="admin" checked>
                            <span class="radio-custom"></span>
                            🔧 Administrator
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="staff">
                            <span class="radio-custom"></span>
                            👨‍🏫 Staff Member
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="student">
                            <span class="radio-custom"></span>
                            🎒 Student
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username:</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username" class="form-input">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password" class="form-input">
                </div>
                
                <button type="submit" class="login-btn">🚪 Login</button>
            </form>

            <!-- Removed demo accounts section -->
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
